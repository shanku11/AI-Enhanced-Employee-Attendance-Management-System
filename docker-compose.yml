version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Backend/Dockerfile
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DATABASE_URL=sqlite:////app/Backend/attendance_runtime_v2.db
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - ENVIRONMENT=production
    volumes:
      # Mount DB for persistence
      - ./attendance_runtime_v2.db:/app/Backend/attendance_runtime_v2.db
    restart: unless-stopped

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
